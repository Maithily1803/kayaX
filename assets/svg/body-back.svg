  <!-- Right Glute -->
  <path class="muscle-group" style="cursor:pointer;fill:#1e1e3f;stroke:rgba(99,102,241,0.3);stroke-width:0.6;"
    d="M138 200 Q144 206 146 222 Q148 240 142 256 Q134 268 120 268 Q108 266 106 252 Q104 236 110 218 Q118 204 130 200 Z"
    onclick="document.getElementById('svg-glutes').dispatchEvent(new Event('click',{bubbles:true}))"/>

  <!-- Left Hamstring -->
  <path id="svg-hamstrings" class="muscle-group"
    d="M56 268 Q50 282 50 302 Q50 326 54 346 Q58 360 68 364 Q78 366 84 354 Q90 340 88 318 Q86 294 78 272 Q68 264 58 268 Z"
    data-muscle-name="Hamstrings"/>

  <!-- Right Hamstring -->
  <path class="muscle-group" style="cursor:pointer;fill:#1e1e3f;stroke:rgba(99,102,241,0.3);stroke-width:0.6;"
    d="M144 268 Q150 282 150 302 Q150 326 146 346 Q142 360 132 364 Q122 366 116 354 Q110 340 112 318 Q114 294 122 272 Q132 264 142 268 Z"
    onclick="document.getElementById('svg-hamstrings').dispatchEvent(new Event('click',{bubbles:true}))"/>

  <!-- Left Calf -->
  <path id="svg-calves" class="muscle-group"
    d="M56 366 Q50 378 50 396 Q50 406 56 412 Q64 416 72 412 Q80 406 82 394 Q84 378 78 366 Q68 360 58 366 Z"
    data-muscle-name="Calves"/>

  <!-- Right Calf -->
  <path class="muscle-group" style="cursor:pointer;fill:#1e1e3f;stroke:rgba(99,102,241,0.3);stroke-width:0.6;"
    d="M144 366 Q150 378 150 396 Q150 406 144 412 Q136 416 128 412 Q120 406 118 394 Q116 378 122 366 Q132 360 142 366 Z"
    onclick="document.getElementById('svg-calves').dispatchEvent(new Event('click',{bubbles:true}))"/>

  <!-- Hands -->
  <ellipse cx="14" cy="236" rx="10" ry="14" fill="#16162e" stroke="rgba(99,102,241,0.2)" stroke-width="0.5"/>
  <ellipse cx="186" cy="236" rx="10" ry="14" fill="#16162e" stroke="rgba(99,102,241,0.2)" stroke-width="0.5"/>
</svg>
